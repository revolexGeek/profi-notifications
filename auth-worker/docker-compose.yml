name: profi-auth

services:
  auth-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: profi-auth-worker:0.1.0
    container_name: profi-auth-worker
    restart: unless-stopped

    ports:
      - "127.0.0.1:50051:50051"

    environment:
      PROFI_GRPC_ADDR: "0.0.0.0:50051" # required: 127.0.0.1 is unreachable from outside the container

    env_file:
      - path: .env
        required: false

    volumes:
      - ./data:/app/data

    healthcheck:
      test: ["CMD", "/app/auth-worker", "healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
