name: profi-notifications

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  rabbitmq:
    image: rabbitmq:4-management
    container_name: profi-rabbitmq
    hostname: profi-rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-profi}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-profi}

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    networks:
      - profi-net
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  postgres:
    image: postgres:17-alpine
    container_name: profi-postgres
    hostname: profi-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-profi}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-profi}
      POSTGRES_DB: ${POSTGRES_DB:-order_core}


    volumes:
      - ./postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-profi} -d ${POSTGRES_DB:-order_core}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - profi-net
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  auth-worker:
    build:
      context: ./auth-worker
      dockerfile: Dockerfile
    image: profi-auth-worker:0.1.0
    container_name: profi-auth-worker
    restart: unless-stopped

    environment:
      PROFI_GRPC_ADDR: "0.0.0.0:50051"

    env_file:
      - .env

    volumes:
      - ./auth-worker/data:/app/data

    healthcheck:
      test: ["CMD", "/app/auth-worker", "healthcheck"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3

    networks:
      - profi-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    logging: *default-logging

  parser-worker:
    build:
      context: ./parser-worker
      dockerfile: Dockerfile
    image: profi-parser-worker:0.1.0
    container_name: profi-parser-worker
    restart: unless-stopped

    env_file:
      - .env

    environment:
      PARSER_AMQP_URL: "amqp://${RABBITMQ_USER:-profi}:${RABBITMQ_PASS:-profi}@rabbitmq:5672/%2f"
      PARSER_AUTH_GRPC_ADDR: "http://auth-worker:50051"

    depends_on:
      rabbitmq:
        condition: service_healthy
      auth-worker:
        condition: service_healthy

    networks:
      - profi-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/health && [ $(( $(date +%s) - $(stat -c %Y /tmp/health) )) -lt 40 ]"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

    logging: *default-logging

  llm:
    build:
      context: ./llm
      dockerfile: Dockerfile
    image: profi-llm:0.1.0
    container_name: profi-llm
    restart: unless-stopped

    env_file:
      - .env

    environment:
      RABBITMQ__HOST: rabbitmq
      RABBITMQ__USERNAME: ${RABBITMQ_USER:-profi}
      RABBITMQ__PASSWORD: ${RABBITMQ_PASS:-profi}

    depends_on:
      rabbitmq:
        condition: service_healthy

    networks:
      - profi-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp


    logging: *default-logging

  order-core-service:
    build:
      context: ./order-core-service
      dockerfile: Dockerfile
    image: profi-order-core-service:0.1.0
    container_name: profi-order-core
    restart: unless-stopped

    env_file:
      - .env

    environment:
      RABBITMQ__HOST: rabbitmq
      RABBITMQ__USERNAME: ${RABBITMQ_USER:-profi}
      RABBITMQ__PASSWORD: ${RABBITMQ_PASS:-profi}
      POSTGRES__HOST: postgres
      POSTGRES__USERNAME: ${POSTGRES_USER:-profi}
      POSTGRES__PASSWORD: ${POSTGRES_PASS:-profi}
      POSTGRES__DB: ${POSTGRES_DB:-order_core}

    ports:
      - "127.0.0.1:8001:8000"

    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

    networks:
      - profi-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp


    logging: *default-logging

  notifications:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    image: profi-notifications:0.1.0
    container_name: profi-notifications
    restart: unless-stopped

    env_file:
      - .env

    environment:
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-profi}:${RABBITMQ_PASS:-profi}@rabbitmq:5672"
      HTTP_PORT: "3000"

    ports:
      - "127.0.0.1:3000:3000"

    depends_on:
      rabbitmq:
        condition: service_healthy

    networks:
      - profi-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    logging: *default-logging

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    image: profi-scheduler:0.1.0
    container_name: profi-scheduler
    restart: unless-stopped

    env_file:
      - .env

    environment:
      RABBITMQ__HOST: rabbitmq
      RABBITMQ__USERNAME: ${RABBITMQ_USER:-profi}
      RABBITMQ__PASSWORD: ${RABBITMQ_PASS:-profi}

    depends_on:
      rabbitmq:
        condition: service_healthy

    networks:
      - profi-net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

    logging: *default-logging

networks:
  profi-net:
    driver: bridge

volumes:
  rabbitmq_data:
  postgres_data:
