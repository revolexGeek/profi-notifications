minimum_prek_version = "0.4.0"

[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "fix-byte-order-marker" },
  { id = "check-merge-conflict" },
  { id = "check-case-conflict" },
  { id = "check-illegal-windows-names" },
  { id = "detect-private-key" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json" },
  { id = "check-added-large-files", args = ["--maxkb=1000"], exclude = "(^|/)uv\\.lock$" },
]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  { id = "debug-statements", files = "^parser/.*\\.py$" },
]

[[repos]]
repo = "https://github.com/abravalheri/validate-pyproject"
rev = "v0.25"
hooks = [
  { id = "validate-pyproject", files = "(^|/)pyproject\\.toml$" },
]

[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.30.1"
hooks = [
  { id = "gitleaks" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.13.1"
hooks = [
  { id = "ruff-check", args = ["--fix"], files = "^parser/.*\\.py$" },
  { id = "ruff-format", files = "^parser/.*\\.py$" },
]
